<div class="container">
  <h2>User Management</h2>

  <div *ngIf="loading" class="loading">Loading users...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && !error" class="user-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Full Name</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.fullName || '-' }}</td>
        <td>
          <span [class]="user.roleName === 'ADMIN' ? 'badge-admin' : 'badge-user'">
            {{ user.roleName }}
          </span>
        </td>
        <td class="actions">
          <button class="btn-edit">Edit</button>
          <button class="btn-delete" (click)="deleteUser(user.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && !error && users.length === 0" class="no-data">
    No users found
  </div>
</div>
